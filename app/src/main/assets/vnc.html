<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Glass VNC</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0A0E17;
            touch-action: none;
        }

        #vnc-canvas {
            width: 100%;
            height: calc(100% - 28px);
            margin-top: 28px;
        }

        #status-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 28px;
            background: rgba(10, 14, 23, 0.85);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            padding: 0 12px;
            font-family: monospace;
            font-size: 11px;
            color: #9AA0B4;
            z-index: 1000;
            border-bottom: 1px solid rgba(0, 229, 255, 0.15);
        }

        #status-bar .connected {
            color: #00FF94;
        }

        #status-bar .disconnected {
            color: #FF1744;
        }

        #status-bar .info {
            margin-left: auto;
            color: #00E5FF;
        }

        #password-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(10, 14, 23, 0.92);
            backdrop-filter: blur(8px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        #password-overlay.visible {
            display: flex;
        }

        #password-box {
            background: #141926;
            border: 1px solid rgba(0, 229, 255, 0.3);
            border-radius: 12px;
            padding: 24px;
            text-align: center;
            min-width: 280px;
        }

        #password-box h3 {
            color: #00E5FF;
            margin-bottom: 12px;
            font-family: monospace;
            font-size: 14px;
        }

        #password-box input {
            width: 100%;
            padding: 10px 14px;
            background: #0A0E17;
            border: 1px solid rgba(0, 229, 255, 0.25);
            border-radius: 8px;
            color: #E8EAF6;
            font-size: 14px;
            outline: none;
            margin-bottom: 12px;
        }

        #password-box input:focus {
            border-color: #00E5FF;
        }

        #password-box button {
            width: 100%;
            padding: 10px;
            background: #00E5FF;
            border: none;
            border-radius: 8px;
            color: #0A0E17;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="status-bar">
        <span id="conn-status" class="disconnected">Connecting...</span>
        <span class="info" id="resolution"></span>
    </div>
    <div id="vnc-canvas"></div>

    <div id="password-overlay">
        <div id="password-box">
            <h3>VNC Password</h3>
            <input type="password" id="vnc-pw-input" placeholder="Enter VNC password"/>
            <button id="vnc-pw-submit">Connect</button>
        </div>
    </div>

    <script type="module">
        import RFB from "./novnc/core/rfb.js";

        const WEBSOCKIFY_URL = "ws://127.0.0.1:16080";
        const LONG_PRESS_MS = 500;

        const canvas = document.getElementById("vnc-canvas");
        const connStatus = document.getElementById("conn-status");
        const resolution = document.getElementById("resolution");
        const passwordOverlay = document.getElementById("password-overlay");
        const passwordInput = document.getElementById("vnc-pw-input");
        const passwordSubmit = document.getElementById("vnc-pw-submit");

        let rfb = null;
        let longPressTimer = null;
        let reconnectTimer = null;
        let storedPassword = "";
        let shouldAutoReconnect = false;
        let manualDisconnect = false;
        let reconnectReplacement = false;

        function updateStatus(text, stateClass) {
            connStatus.textContent = text;
            connStatus.className = stateClass;
        }

        function clearReconnectTimer() {
            if (reconnectTimer !== null) {
                window.clearTimeout(reconnectTimer);
                reconnectTimer = null;
            }
        }

        function scheduleReconnect(password) {
            clearReconnectTimer();
            if (!shouldAutoReconnect) {
                return;
            }

            reconnectTimer = window.setTimeout(() => {
                if (shouldAutoReconnect) {
                    connect(password);
                }
            }, 3000);
        }

        function buildRfb(password) {
            const nextRfb = new RFB(canvas, WEBSOCKIFY_URL, {
                credentials: password ? { password } : {},
                wsProtocols: ["binary"],
            });

            nextRfb.viewOnly = false;
            nextRfb.scaleViewport = true;
            nextRfb.resizeSession = false;
            nextRfb.showDotCursor = true;
            nextRfb.background = "#0A0E17";
            nextRfb.qualityLevel = 6;
            nextRfb.compressionLevel = 2;
            return nextRfb;
        }

        function connect(password) {
            const nextPassword = password || storedPassword || "";
            storedPassword = nextPassword;
            shouldAutoReconnect = true;
            manualDisconnect = false;
            clearReconnectTimer();

            if (rfb) {
                reconnectReplacement = true;
                const current = rfb;
                rfb = null;
                current.disconnect();
            }

            updateStatus("Connecting...", "disconnected");

            try {
                const nextRfb = buildRfb(nextPassword);
                rfb = nextRfb;

                nextRfb.addEventListener("connect", () => {
                    updateStatus("Connected", "connected");
                    passwordOverlay.classList.remove("visible");
                    if (window.AndroidBridge) {
                        window.AndroidBridge.onVncConnected();
                    }
                });

                nextRfb.addEventListener("disconnect", (event) => {
                    const wasManual = manualDisconnect;
                    const wasReconnectReplacement = reconnectReplacement;
                    manualDisconnect = false;
                    reconnectReplacement = false;

                    if (rfb === nextRfb) {
                        rfb = null;
                    }

                    updateStatus(wasManual ? "Disconnected" : "Connection lost", "disconnected");
                    if (window.AndroidBridge) {
                        const reason = wasManual ? "manual" : (event.detail.clean ? "clean" : "error");
                        window.AndroidBridge.onVncDisconnected(reason);
                    }

                    if (!wasManual && !wasReconnectReplacement) {
                        scheduleReconnect(nextPassword);
                    }
                });

                nextRfb.addEventListener("credentialsrequired", () => {
                    if (storedPassword) {
                        nextRfb.sendCredentials({ password: storedPassword });
                    } else {
                        passwordOverlay.classList.add("visible");
                        passwordInput.focus();
                    }
                });

                nextRfb.addEventListener("desktopname", (event) => {
                    resolution.textContent = event.detail.name;
                });
            } catch (error) {
                console.error("VNC connection error:", error);
                updateStatus("Error", "disconnected");
                scheduleReconnect(nextPassword);
            }
        }

        function connectVnc(password) {
            connect(password);
        }

        function setVncPassword(password) {
            storedPassword = password || "";
            if (rfb && storedPassword) {
                rfb.sendCredentials({ password: storedPassword });
            }
        }

        function disconnectVnc() {
            shouldAutoReconnect = false;
            manualDisconnect = true;
            clearReconnectTimer();
            passwordOverlay.classList.remove("visible");
            updateStatus("Disconnected", "disconnected");

            if (rfb) {
                const current = rfb;
                rfb = null;
                current.disconnect();
            }
        }

        passwordSubmit.addEventListener("click", () => {
            const password = passwordInput.value;
            if (!password) {
                return;
            }

            storedPassword = password;
            passwordOverlay.classList.remove("visible");
            if (rfb) {
                manualDisconnect = false;
                shouldAutoReconnect = true;
                rfb.sendCredentials({ password });
            } else {
                connect(password);
            }
        });

        passwordInput.addEventListener("keydown", (event) => {
            if (event.key === "Enter") {
                passwordSubmit.click();
            }
        });

        canvas.addEventListener("touchstart", (event) => {
            if (event.touches.length !== 1) {
                return;
            }

            const touch = event.touches[0];
            longPressTimer = window.setTimeout(() => {
                if (!rfb) {
                    return;
                }

                const rect = canvas.getBoundingClientRect();
                const x = touch.clientX - rect.left;
                const y = touch.clientY - rect.top;
                rfb.sendPointerEvent(x, y, 4);
                window.setTimeout(() => rfb && rfb.sendPointerEvent(x, y, 0), 50);
                if (navigator.vibrate) {
                    navigator.vibrate(30);
                }
            }, LONG_PRESS_MS);
        }, { passive: true });

        canvas.addEventListener("touchend", () => {
            window.clearTimeout(longPressTimer);
        }, { passive: true });

        canvas.addEventListener("touchmove", () => {
            window.clearTimeout(longPressTimer);
        }, { passive: true });

        window.connectVnc = connectVnc;
        window.setVncPassword = setVncPassword;
        window.disconnectVnc = disconnectVnc;

        if (window.AndroidBridge) {
            window.AndroidBridge.onVncPageReady();
        }
    </script>
</body>
</html>
